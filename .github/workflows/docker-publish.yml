name: Build & Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'             # Triggered by release.yml auto-tagging — carries version + changelog
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_IMAGE: sanjaysinalkar/shradhanjali-banner
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────
# PIPELINE ORDER:
#   1. secrets-scan   ─┐
#   2. lint-dockerfile ─┴─ both must pass
#   3. build-and-push   → docker.io/sanjaysinalkar/shradhanjali-banner
#                         tags aligned with GitHub releases (v1.2.3 → 1.2.3, 1.2, latest)
#                         Docker Hub description + changelog updated automatically
# ─────────────────────────────────────────────────────────────────

jobs:

  # ── GATE 1: Secrets & credential leak detection ──────────────────
  secrets-scan:
    name: Secrets Leak Scan (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── GATE 2: Dockerfile linting ───────────────────────────────────
  lint-dockerfile:
    name: Dockerfile Lint (Hadolint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3018,DL3008
          failure-threshold: warning

  # ── PUBLISH: Only runs after both gates pass ─────────────────────
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: [secrets-scan, lint-dockerfile]

    permissions:
      contents: read   # Needed to read GitHub release notes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Verify Docker Hub login
        run: |
          echo "Logged in as: ${{ secrets.DOCKERHUB_USERNAME }}"
          docker info | grep Username || echo "WARNING: could not verify login"

      # Tags aligned with GitHub releases created by release.yml:
      #   tag push v1.2.3  → 1.2.3 + 1.2 + latest
      #   push to main     → latest + sha-<short>
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container   # Use container driver so login creds are passed through

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false          # Avoids extra manifest push that can trigger scope errors

      # Fetch release notes for this tag (if triggered by a version tag push)
      # Falls back to a generic message for plain main-branch pushes
      - name: Fetch release changelog
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            NOTES=$(gh release view "$TAG" --json body -q '.body' 2>/dev/null || echo "")
            if [ -z "$NOTES" ]; then
              NOTES="See [GitHub Releases](https://github.com/${{ github.repository }}/releases/tag/${TAG}) for full details."
            fi
            echo "has_release=true"  >> $GITHUB_OUTPUT
            echo "tag=${TAG}"        >> $GITHUB_OUTPUT
          else
            NOTES="Latest build from \`main\` branch. See [all releases](https://github.com/${{ github.repository }}/releases) for versioned changelogs."
            echo "has_release=false" >> $GITHUB_OUTPUT
            echo "tag=latest"        >> $GITHUB_OUTPUT
          fi
          # Write notes to file (avoids multiline env var quoting issues)
          echo "$NOTES" > /tmp/release_notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Prepend the changelog to the Docker Hub description and push it
      - name: Update Docker Hub description with changelog
        run: |
          TAG="${{ steps.changelog.outputs.tag }}"
          NOTES=$(cat /tmp/release_notes.md)

          # Build a combined description: changelog block on top, then base description
          cat > /tmp/dockerhub_full.md <<MARKDOWN
          ## Latest Release: ${TAG}

          ${NOTES}

          ---

          $(cat DOCKER_HUB_DESCRIPTION.md)
          MARKDOWN

          cp /tmp/dockerhub_full.md DOCKER_HUB_DESCRIPTION.md

      - name: Push description to Docker Hub
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_IMAGE }}
          readme-filepath: ./DOCKER_HUB_DESCRIPTION.md
          short-description: "Free memorial banner generator — 12 Indian languages, 6 themes, WhatsApp/print/flex download"
