name: Build & Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GHCR_IMAGE: ghcr.io/sinalkar/shradhanjali-banner
  DOCKERHUB_IMAGE: sinalkar/shradhanjali-banner
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────
# PIPELINE ORDER:
#   1. secrets-scan   ─┐
#   2. lint-dockerfile ─┴─ both must pass
#   3. build-and-push   → ghcr.io  (always works, no extra creds)
#                       → Docker Hub (requires DOCKERHUB_USERNAME + DOCKERHUB_TOKEN)
#                         both tagged to match GitHub releases
# ─────────────────────────────────────────────────────────────────

jobs:

  # ── GATE 1: Secrets & credential leak detection ──────────────────
  secrets-scan:
    name: Secrets Leak Scan (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── GATE 2: Dockerfile linting ───────────────────────────────────
  lint-dockerfile:
    name: Dockerfile Lint (Hadolint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3018,DL3008
          failure-threshold: warning

  # ── PUBLISH: Only runs after both gates pass ─────────────────────
  build-and-push:
    name: Build & Push (ghcr.io + Docker Hub)
    runs-on: ubuntu-latest
    needs: [secrets-scan, lint-dockerfile]

    permissions:
      contents: read
      packages: write    # Required for ghcr.io push via GITHUB_TOKEN

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Login to ghcr.io (no secrets needed — GITHUB_TOKEN is automatic)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tags aligned with GitHub releases (v1.2.3 → 1.2.3, 1.2, latest + sha)
      # Both registries get the same tags in one build
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Single build — pushed to both registries simultaneously
      - name: Build and push to ghcr.io + Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Update Docker Hub description with latest changelog ───────
      - name: Fetch release changelog
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            NOTES=$(gh release view "$TAG" --json body -q '.body' 2>/dev/null || echo "")
            [ -z "$NOTES" ] && NOTES="See [GitHub Releases](https://github.com/${{ github.repository }}/releases/tag/${TAG}) for full details."
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          else
            NOTES="Latest build from \`main\` branch. See [all releases](https://github.com/${{ github.repository }}/releases) for versioned changelogs."
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi
          echo "$NOTES" > /tmp/release_notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepend changelog to Docker Hub description
        run: |
          TAG="${{ steps.changelog.outputs.tag }}"
          printf "## Latest Release: %s\n\n%s\n\n---\n\n%s" \
            "$TAG" \
            "$(cat /tmp/release_notes.md)" \
            "$(cat DOCKER_HUB_DESCRIPTION.md)" \
            > /tmp/dockerhub_full.md
          cp /tmp/dockerhub_full.md DOCKER_HUB_DESCRIPTION.md

      - name: Push description to Docker Hub
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_IMAGE }}
          readme-filepath: ./DOCKER_HUB_DESCRIPTION.md
          short-description: "Free memorial banner generator — 12 Indian languages, 6 themes, WhatsApp/print/flex download"
