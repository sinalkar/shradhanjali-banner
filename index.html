        .banner {
            width: 100%;
            min-height: 650px;
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: background 0.5s ease;
        }
        
        .banner-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3) 0%, transparent 50%), radial-gradient(circle at 70% 70%, rgba(255,255,255,0.2) 0%, transparent 50%); }
        .decorative-elements { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .lamp { position: absolute; top: 10px; left: 10px; width: 60px; height: 80px; background: linear-gradient(45deg, #f39c12, #e67e22); border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .lamp::before { content: ''; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 20px; height: 20px; background: #f39c12; border-radius: 50%; }
        .flowers { position: absolute; width: 40px; height: 40px; background: radial-gradient(circle, #e74c3c 30%, #c0392b 60%, transparent 70%); border-radius: 50%; opacity: 0.8; transition: opacity 0.5s ease; }
        .flower1 { top: 20px; right: 20px; animation: float 3s ease-in-out infinite; }
        .flower2 { bottom: 20px; left: 20px; animation: float 3s ease-in-out infinite 1.5s; }
        .flower3 { bottom: 20px; right: 20px; animation: float 3s ease-in-out infinite 0.5s; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }

        .photo-frame {
            width: 452px;
            height: 504px;
            border-radius: 50%;
            background: transparent;
            padding: 10px;
            /* box-shadow: 0 0 0 10px #d4af37, 0 0 0 12px #fff, 0 10px 30px rgba(0,0,0,0.3); */
            overflow: hidden;
            position: relative;
            z-index: 2;
            margin: 36px 0px 0px 15px;
            /* border: 2px solid #fff; */
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
        
        .main-text, .age-text, .death-info {
            text-align: center;
            width: 100%;
            transition: color 0.5s ease;
        }

        .main-text {
            font-size: 44px;
            font-weight: 400;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.9);
            font-family: 'Rozha One', serif;
            margin-top: 1rem;
        }

        .age-text, .death-info {
            font-family: 'Tiro Devanagari Marathi', serif;
            font-weight: bold;
            color: #894dce;
        }

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <script>
        // Color Theme Definitions
        const colorThemes = {
            'traditional': {
                bannerBg: 'radial-gradient(circle, #faf8f0, #f5f2e9)',
                mainTextColor: '#a805a1',
                baseTextColor: '#360128',
                memorialTextBg: 'rgba(255, 228, 225, 0.5)',
                memorialTextColor: '#64127c',
                ceremonyBg: 'transparent',
                ceremonyDetailsColor: '#212121',
                ceremonyTitleColor: '#894dce',
                familyBg: '#460137',
                familyColor: '#FFFFFF',
                villageInfoColor: '#fcf9fb',
                showFlowers: false
            },
            'sunset': {
                bannerBg: 'linear-gradient(135deg, #ffeaa7, #fab1a0)',
                mainTextColor: '#8e44ad',
                baseTextColor: '#2c3e50',
                memorialTextBg: 'rgba(255,255,255,0.9)',
                memorialTextColor: '#2c3e50',
                ceremonyBg: 'rgba(142, 68, 173, 0.9)',
                ceremonyDetailsColor: '#ffffff',
                ceremonyTitleColor: '#ffeaa7',
                familyBg: 'rgba(44, 62, 80, 0.85)',
                familyColor: '#FFFFFF',
                villageInfoColor: '#8e44ad',
                showFlowers: true
            },
            'ocean': {
                bannerBg: 'linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 100%)',
                mainTextColor: '#0c4a6e',
                baseTextColor: '#1e3a4c',
                memorialTextBg: 'rgba(255,255,255,0.8)',
                memorialTextColor: '#0c4a6e',
                ceremonyBg: 'rgba(2, 63, 115, 0.9)',
                ceremonyDetailsColor: '#ffffff',
                ceremonyTitleColor: '#f0f9ff',
                familyBg: 'rgba(14, 116, 144, 0.9)',
                familyColor: '#ffffff',
                villageInfoColor: '#f0f9ff',
                showFlowers: true
            },
            'classic': {
                bannerBg: 'linear-gradient(135deg, #f5f5f5, #e0e0e0)',
                mainTextColor: '#212121',
                baseTextColor: '#212121',
                memorialTextBg: 'rgba(255,255,255,0.8)',
                memorialTextColor: '#212121',
                ceremonyBg: 'rgba(33, 33, 33, 0.9)',
                ceremonyDetailsColor: '#ffffff',
                ceremonyTitleColor: '#d32f2f',
                familyBg: 'rgba(66, 66, 66, 0.9)',
                familyColor: '#ffffff',
                villageInfoColor: '#d32f2f',
                showFlowers: false
            }
        };

        function applyTheme(themeName) {
            const theme = colorThemes[themeName];
            if (!theme) return;
            
            const elements = {
                banner: document.getElementById('banner'),
                nameDisplay: document.getElementById('nameDisplay'),
                ageText: document.getElementById('ageDisplay'),
                deathInfo: document.getElementById('deathInfoDisplay'),
                memorialText: document.getElementById('memorialDisplay'),
                ceremonyInfo: document.getElementById('ceremonyInfo'),
                ceremonyDetails: document.getElementById('ceremonyDetailsDisplay'),
                ceremonyTitle: document.getElementById('ceremonyTitleDisplay'),
                familyInfo: document.getElementById('familyInfo'),
                villageInfo1: document.getElementById('villageInfoDisplay'),
                villageInfo2: document.getElementById('villageInfoDisplay2'),
                flowers: document.querySelectorAll('.flowers')
            };

            elements.banner.style.background = theme.bannerBg;
            elements.nameDisplay.style.color = theme.mainTextColor;
            // elements.ageText.style.color = theme.baseTextColor;
            elements.deathInfo.style.color = theme.baseTextColor;
            
            elements.memorialText.style.background = theme.memorialTextBg;
            elements.memorialText.style.color = theme.memorialTextColor;
            
            elements.ceremonyInfo.style.background = theme.ceremonyBg;
            elements.ceremonyDetails.style.color = theme.ceremonyDetailsColor;
            elements.ceremonyTitle.style.color = theme.ceremonyTitleColor;

            elements.familyInfo.style.background = theme.familyBg;
            elements.familyInfo.style.color = theme.familyColor;
            elements.villageInfo1.style.color = theme.villageInfoColor;
            elements.villageInfo2.style.color = "#ffdb36";
            
            elements.flowers.forEach(flower => {
                flower.style.opacity = theme.showFlowers ? '0.8' : '0';
            });
        }

        function generateBanner() {
            const selectedTheme = document.getElementById('colorTheme').value;
            applyTheme(selectedTheme);

            document.getElementById('nameDisplay').textContent = 'कै. ' + document.getElementById('name').value;
            document.getElementById('ageDisplay').textContent = `(वय: ${document.getElementById('age').value})`;
            document.getElementById('deathInfoDisplay').textContent = `यांचे ${document.getElementById('deathDate').value} रोजी ${document.getElementById('deathTime').value}`;
            document.getElementById('memorialDisplay').innerHTML = document.getElementById('memorialText').value.replace(/\n/g, '<br>');
            document.getElementById('ceremonyTitleDisplay').textContent = document.getElementById('ceremonyTitle').value;
            
            const ceremonyDate = document.getElementById('ceremonyDate').value;
            const ceremonyTime = document.getElementById('ceremonyTime').value;
            const ceremonyPlace = document.getElementById('ceremonyPlace').value;
            document.getElementById('ceremonyDetailsDisplay').innerHTML = `
                <div style="font-weight: bold; font-size: 3.2em;color: #a4246a;">* दशक्रिया विधी *</div>
                <div style="font-weight: bold; font-size: 1.6em;color: #a4246a;">${ceremonyDate} रोजी ${ceremonyTime}</div>
                <div style="font-weight: bold; font-size: 1.6em;color: #a4246a;">${ceremonyPlace.replace(/\n/g, '<br>')} येथे होईल.</div>
            `;
            
            // document.getElementById('organizerDisplay').textContent = `* प्रवचनकार : ${document.getElementById('organizer').value} *`;
            document.getElementById('villageInfoDisplay2').textContent = document.getElementById('villageInfo').value;
            
            const familyMembersValue = document.getElementById('familyMembers').value;
            const membersArray = familyMembersValue.split('\n').filter(member => member.trim() !== '');
            let familyHtml = '';
            membersArray.forEach(member => {
                familyHtml += `<div class="col-sm-4 family-member-item">${member.trim()}</div>`;
            });
            document.getElementById('familyMembersDisplay').innerHTML = familyHtml;
        }

        document.getElementById('mainPhoto').addEventListener('change', function(e) {
            if (e.target.files && e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    document.getElementById('mainPhotoPreview').src = ev.target.result;
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        function downloadBanner(event) {
            const bannerElement = document.getElementById('banner');
            const downloadButton = event.currentTarget;
            const originalButtonText = downloadButton.innerHTML;

            downloadButton.innerHTML = 'Downloading...';
            downloadButton.disabled = true;

            html2canvas(bannerElement, {
                scale: 2.5,
                useCORS: true,
                logging: false
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'memorial-banner.jpg';
                link.href = canvas.toDataURL('image/jpeg', 0.95);
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                downloadButton.innerHTML = originalButtonText;
                downloadButton.disabled = false;
            }).catch(err => {
                console.error("Error generating canvas: ", err);
                alert("Sorry, something went wrong while creating the image.");
                downloadButton.innerHTML = originalButtonText;
                downloadButton.disabled = false;
            });
        }

        window.onload = generateBanner;
    </script>
