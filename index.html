    <style>
    /* ─── DESIGN TOKENS ─────────────────────────────────────── */
    :root {
        --page-bg:         #07000c;
        --page-glow:       radial-gradient(ellipse 90% 55% at 50% -5%, rgba(70,1,55,0.55) 0%, transparent 65%);
        --header-bg:       #3a0130;
        --header-border:   #c9a06a;
        --header-text:     #fff5ee;
        --header-sub:      rgba(255,240,220,0.72);
        --gold:            #c9a06a;
        --gold-light:      #f0cc88;
        --card-bg:         #ffffff;
        --card-radius:     18px;
        --card-shadow:     0 48px 120px rgba(0,0,0,0.75), 0 0 0 1px rgba(201,160,106,0.18);
        --form-surface:    #fdf8f0;
        --form-divider:    #e4cfb4;
        --form-heading:    #460137;
        --field-bg:        #fffcf7;
        --field-border:    #dcc8aa;
        --field-focus:     #460137;
        --field-text:      #1c070e;
        --label-color:     #3d1020;
        --placeholder:     #a08878;
        --preview-surface: #f6f0e8;
        --preview-heading: #460137;
        --btn-gen:         #460137;
        --btn-gen-hover:   #6a0249;
        --btn-dl:          #c97d08;
        --btn-dl-hover:    #a56400;
        --footer-text:     rgba(255,240,220,0.45);
    }
    [data-theme="light"] {
        --page-bg:      #ede0d6;
        --page-glow:    radial-gradient(ellipse 90% 55% at 50% -5%, rgba(70,1,55,0.18) 0%, transparent 65%);
        --card-shadow:  0 24px 64px rgba(70,1,55,0.14), 0 0 0 1px rgba(201,160,106,0.25);
        --footer-text:  rgba(80,20,40,0.45);
    }

    /* ─── RESETS ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    /* ─── PAGE ───────────────────────────────────────────────── */
    body {
        background: var(--page-bg);
        font-family: 'Tiro Devanagari Marathi', serif;
        font-size: 16px;
        min-height: 100vh;
        padding-left:   env(safe-area-inset-left);
        padding-right:  env(safe-area-inset-right);
        padding-bottom: max(0px, env(safe-area-inset-bottom));
        transition: background 0.4s ease;
    }
    .page-ambient {
        position: fixed; inset: 0;
        background: var(--page-glow);
        pointer-events: none; z-index: 0;
        transition: background 0.4s ease;
    }

    /* ─── APP SHELL ──────────────────────────────────────────── */
    .app-shell {
        position: relative; z-index: 1;
        max-width: 1240px;
        margin: 0 auto;
        padding: 2rem 1.25rem 3rem;
        animation: shell-enter 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes shell-enter {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── SITE HEADER ────────────────────────────────────────── */
    .site-header {
        background: var(--header-bg);
        border-radius: var(--card-radius) var(--card-radius) 0 0;
        padding: 2.25rem 2rem 1.75rem;
        position: relative; overflow: hidden;
        text-align: center;
        border-bottom: 1.5px solid var(--header-border);
    }
    .site-header::before {
        content: '';
        position: absolute; top: -60%; left: 50%; transform: translateX(-50%);
        width: 70%; height: 200%;
        background: radial-gradient(ellipse, rgba(201,160,106,0.1) 0%, transparent 65%);
        pointer-events: none;
    }
    .header-inner { position: relative; z-index: 1; }
    .header-mantra {
        color: var(--gold); font-size: 1.05rem;
        letter-spacing: 0.55em; margin-bottom: 0.5rem;
    }
    .site-header h1 {
        font-family: 'Rozha One', serif;
        font-size: clamp(2rem, 5vw, 3.2rem);
        color: var(--header-text);
        letter-spacing: 0.02em; line-height: 1.1;
        text-wrap: balance; margin-bottom: 0.45rem;
    }
    .site-header .header-sub { color: var(--header-sub); font-size: 0.9rem; letter-spacing: 0.05em; }
    .header-divider {
        width: 160px; height: 1px;
        background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
        margin: 0.9rem auto 0; opacity: 0.7;
    }

    /* Diya decorations */
    .header-diya {
        position: absolute; top: 50%; transform: translateY(-55%);
        display: flex; flex-direction: column; align-items: center; gap: 0; opacity: 0.9;
    }
    .header-diya.left  { left: 2.5rem; }
    .header-diya.right { right: 2.5rem; }
    .diya-flame {
        width: 10px; height: 20px;
        background: linear-gradient(to top, #f5a500 0%, #ffe880 55%, transparent 100%);
        border-radius: 50% 50% 30% 30%; margin-bottom: -2px;
        animation: flame 1.6s ease-in-out infinite;
        transform-origin: bottom center;
    }
    .diya-bowl {
        width: 32px; height: 17px;
        background: linear-gradient(150deg, #d4860a 0%, #f5be00 45%, #c07000 100%);
        border-radius: 50% 50% 42% 42% / 62% 62% 48% 48%;
        box-shadow: 0 3px 10px rgba(0,0,0,0.35);
    }
    @keyframes flame {
        0%,100% { transform: scaleX(1) rotate(-2deg); opacity: 0.92; }
        35%      { transform: scaleX(0.78) rotate(4deg); opacity: 1; }
        70%      { transform: scaleX(1.08) rotate(-1deg); opacity: 0.88; }
    }
    @media (max-width: 500px) { .header-diya { display: none; } }

    /* Header controls (language + theme toggle) */
    .header-controls {
        position: absolute; top: 1rem; right: 1rem;
        display: flex; gap: 0.5rem; align-items: center; z-index: 2;
    }
    .lang-select {
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(201,160,106,0.4);
        border-radius: 8px;
        color: var(--gold);
        font-family: 'Tiro Devanagari Marathi', serif;
        font-size: 0.82rem;
        padding: 0.3rem 0.5rem;
        cursor: pointer;
        transition: background 0.2s;
    }
    .lang-select:hover { background: rgba(201,160,106,0.18); }
    .lang-select option { background: #3a0130; color: #fff8ee; }
    .ui-theme-btn {
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(201,160,106,0.35);
        border-radius: 50%; width: 38px; height: 38px;
        cursor: pointer; color: var(--gold);
        display: flex; align-items: center; justify-content: center;
        transition: background 0.2s, transform 0.2s; flex-shrink: 0;
    }
    .ui-theme-btn:hover { background: rgba(201,160,106,0.18); transform: rotate(20deg); }
    .ui-theme-btn svg { width: 18px; height: 18px; }
    .icon-moon { display: block; }
    .icon-sun  { display: none; }
    [data-theme="light"] .icon-moon { display: none; }
    [data-theme="light"] .icon-sun  { display: block; }

    /* ─── MAIN CARD ──────────────────────────────────────────── */
    .main-card {
        background: var(--card-bg);
        box-shadow: var(--card-shadow);
        border-radius: 0 0 var(--card-radius) var(--card-radius);
        overflow: hidden;
        transition: box-shadow 0.4s ease;
    }

    /* ─── PANEL HEADING ──────────────────────────────────────── */
    .panel-heading {
        font-family: 'Rozha One', serif;
        font-size: 1.45rem; color: var(--form-heading);
        display: flex; align-items: center; gap: 0.85rem;
    }
    .panel-heading::after {
        content: ''; flex: 1; height: 1.5px;
        background: linear-gradient(90deg, var(--gold) 0%, transparent 100%);
        opacity: 0.55;
    }

    /* ─── FORM PANEL ─────────────────────────────────────────── */
    .form-panel {
        background: var(--form-surface);
        padding: 2rem 2.5rem;
        border-bottom: 1px solid var(--form-divider);
        animation: panel-in 0.6s 0.15s cubic-bezier(0.22,1,0.36,1) both;
    }
    .form-panel > .panel-heading { margin-bottom: 1.5rem; }
    @keyframes panel-in {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── THEME PICKER ───────────────────────────────────────── */
    .theme-picker { margin-bottom: 1.5rem; }
    .picker-label { font-weight: 700; font-size: 0.875rem; color: var(--label-color); margin-bottom: 0.75rem; }
    .theme-swatches { display: flex; gap: 0.65rem; flex-wrap: wrap; }
    .theme-swatch {
        background: none; border: 2.5px solid transparent;
        border-radius: 11px; cursor: pointer; padding: 4px;
        transition: border-color 0.18s, transform 0.15s, box-shadow 0.18s;
        display: flex; flex-direction: column; align-items: center; gap: 5px;
    }
    .theme-swatch:hover { transform: translateY(-3px); }
    .theme-swatch.active {
        border-color: var(--btn-gen);
        box-shadow: 0 0 0 3px rgba(70,1,55,0.15), 0 4px 12px rgba(70,1,55,0.2);
    }
    .swatch-preview {
        width: 52px; height: 34px; border-radius: 7px;
        display: block; box-shadow: 0 2px 6px rgba(0,0,0,0.18);
    }
    .swatch-label {
        font-size: 0.71rem; color: var(--label-color);
        font-family: 'Tiro Devanagari Marathi', serif;
        font-weight: 700; white-space: nowrap;
    }

    /* ─── FORMAT PICKER ──────────────────────────────────────── */
    .format-picker { margin-bottom: 1.5rem; }
    .flex-options { display: flex; gap: 0.5rem; margin-top: 0.6rem; flex-wrap: wrap; }
    .flex-options select { flex: 1; min-width: 140px; }

    /* ─── FIELD GRID ─────────────────────────────────────────── */
    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 2.5rem; }
    @media (max-width: 660px) { .field-grid { grid-template-columns: 1fr; } }

    .field-group { margin-bottom: 1rem; }
    .field-label {
        display: block;
        font-family: 'Tiro Devanagari Marathi', serif;
        font-weight: 700; font-size: 0.845rem;
        color: var(--label-color); margin-bottom: 0.3rem;
    }
    .field-input, .field-textarea, .field-file {
        width: 100%;
        background: var(--field-bg);
        border: 1.5px solid var(--field-border);
        border-radius: 8px; padding: 0.55rem 0.85rem;
        font-family: 'Tiro Devanagari Marathi', serif;
        font-size: 0.95rem; color: var(--field-text);
        transition: border-color 0.2s, box-shadow 0.2s;
        outline: none; appearance: none;
    }
    .field-input:focus, .field-textarea:focus {
        border-color: var(--field-focus);
        box-shadow: 0 0 0 3px rgba(70,1,55,0.1);
    }
    .field-input::placeholder, .field-textarea::placeholder { color: var(--placeholder); }
    .field-textarea { resize: vertical; }
    .field-file { padding: 0.45rem 0.75rem; cursor: pointer; }

    /* ─── ACTION BUTTONS ─────────────────────────────────────── */
    .action-row { display: flex; gap: 1rem; margin-top: 1.75rem; flex-wrap: wrap; }
    @media (max-width: 420px) { .action-row { flex-direction: column; } }

    .btn-generate, .btn-download {
        flex: 1; min-width: 155px;
        padding: 0.8rem 1.5rem;
        font-family: 'Tiro Devanagari Marathi', serif;
        font-weight: 700; font-size: 1rem;
        border: none; border-radius: 10px;
        cursor: pointer; position: relative; overflow: hidden;
        transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-generate::after, .btn-download::after {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(to bottom, rgba(255,255,255,0.07) 0%, transparent 50%);
        pointer-events: none;
    }
    .btn-generate { background: var(--btn-gen); color: #fff5ee; box-shadow: 0 4px 16px rgba(70,1,55,0.3); }
    .btn-generate:hover { background: var(--btn-gen-hover); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(70,1,55,0.4); }
    .btn-download { background: var(--btn-dl); color: #180800; box-shadow: 0 4px 16px rgba(201,125,8,0.3); }
    .btn-download:hover { background: var(--btn-dl-hover); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(165,100,0,0.38); }
    .btn-generate:active, .btn-download:active { transform: translateY(0); }
    .btn-generate:focus-visible, .btn-download:focus-visible { outline: 3px solid #894dce; outline-offset: 3px; }
    .btn-generate:disabled, .btn-download:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    /* Mobile scroll-to-preview button */
    .btn-scroll-preview {
        width: 100%; margin-top: 0.75rem;
        padding: 0.65rem; border-radius: 10px;
        background: transparent; border: 1.5px solid var(--field-border);
        color: var(--label-color);
        font-family: 'Tiro Devanagari Marathi', serif;
        font-size: 0.9rem; font-weight: 700; cursor: pointer;
        transition: border-color 0.2s, background 0.2s;
    }
    .btn-scroll-preview:hover { border-color: var(--btn-gen); background: rgba(70,1,55,0.05); }
    @media (min-width: 768px) { .btn-scroll-preview { display: none; } }

    /* ─── PREVIEW PANEL ──────────────────────────────────────── */
    .preview-panel {
        background: var(--preview-surface);
        padding: 2rem 2.5rem 2.5rem;
        border-radius: 0 0 var(--card-radius) var(--card-radius);
        animation: panel-in 0.6s 0.3s cubic-bezier(0.22,1,0.36,1) both;
    }
    @media (max-width: 660px) { .form-panel, .preview-panel { padding: 1.5rem 1.1rem; } }

    .preview-heading-row {
        display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem;
    }
    .preview-heading-row .panel-heading { flex: 1; margin-bottom: 0; }
    .preview-heading-row .panel-heading::after { display: none; }

    .preview-zoom-btn {
        background: var(--btn-gen); color: #fff5ee;
        border: none; border-radius: 8px;
        padding: 0.42rem 0.75rem; cursor: pointer;
        font-size: 1rem; transition: background 0.2s;
        flex-shrink: 0; display: flex; align-items: center; gap: 4px;
    }
    .preview-zoom-btn:hover { background: var(--btn-gen-hover); }
    .preview-zoom-btn svg { width: 16px; height: 16px; }

    /* ─── BANNER PREVIEW ─────────────────────────────────────── */
    .banner-preview-wrapper {
        width: 100%;
        touch-action: manipulation;
    }

    /* ─── PREVIEW DIALOG ─────────────────────────────────────── */
    .preview-dialog {
        background: rgba(5,0,10,0.97);
        border: 1px solid rgba(201,160,106,0.3);
        border-radius: 14px; padding: 0;
        max-width: 95vw; max-height: 95vh;
        overflow: hidden; position: fixed;
    }
    .preview-dialog::backdrop { background: rgba(0,0,0,0.88); }
    .dialog-inner {
        padding: 3rem 1.5rem 1.5rem;
        display: flex; justify-content: center; align-items: center;
        min-height: 60px;
    }
    .dialog-inner img { max-width: 100%; max-height: 82vh; border-radius: 10px; display: block; }
    .dialog-close {
        position: absolute; top: 0.6rem; right: 0.75rem;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(201,160,106,0.3);
        color: var(--gold); border-radius: 50%;
        width: 32px; height: 32px; cursor: pointer;
        font-size: 1rem; line-height: 1;
        display: flex; align-items: center; justify-content: center;
        transition: background 0.2s;
    }
    .dialog-close:hover { background: rgba(201,160,106,0.2); }
    .dialog-loading {
        color: var(--gold); font-family: 'Tiro Devanagari Marathi', serif;
        font-size: 0.9rem; padding: 2rem; text-align: center;
    }

    /* ─── BANNER INTERNALS (unchanged visual logic) ──────────── */
    .banner {
        width: 100%; min-height: 650px; position: relative;
        border-radius: 14px; overflow: hidden;
        box-shadow: 0 16px 48px rgba(0,0,0,0.25);
        transition: background 0.5s ease; transform-origin: top left;
    }
    .banner-bg {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3) 0%, transparent 50%),
                    radial-gradient(circle at 70% 70%, rgba(255,255,255,0.2) 0%, transparent 50%);
    }
    .decorative-elements { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .lamp { position: absolute; top: 10px; left: 10px; width: 60px; height: 80px; background: linear-gradient(45deg, #f39c12, #e67e22); border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    .lamp::before { content: ''; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 20px; height: 20px; background: #f39c12; border-radius: 50%; }
    .flowers { position: absolute; width: 40px; height: 40px; background: radial-gradient(circle, #e74c3c 30%, #c0392b 60%, transparent 70%); border-radius: 50%; opacity: 0.8; transition: opacity 0.5s ease; }
    .flower1 { top: 20px; right: 20px; animation: float 3s ease-in-out infinite; }
    .flower2 { bottom: 20px; left: 20px; animation: float 3s ease-in-out infinite 1.5s; }
    .flower3 { bottom: 20px; right: 20px; animation: float 3s ease-in-out infinite 0.5s; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    .photo-frame-container { position: relative; width: 100%; aspect-ratio: 480 / 640; }

    ════════════════════════════════════════════════════════════ */
    let currentLang = localStorage.getItem('shradhLang') || 'mr';

    function t(key, ...args) {
      let s = TRANSLATIONS[currentLang]?.[key] ?? TRANSLATIONS.mr[key] ?? key;
      args.forEach((a, i) => { s = s.replace('{' + i + '}', a); });
      return s;
    }

    function applyI18n() {
      // data-i18n: set textContent
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        const val = TRANSLATIONS[currentLang]?.[key];
        if (!val) return;
        el.textContent = val;
      });
      // data-i18n-ph: set placeholder
      document.querySelectorAll('[data-i18n-ph]').forEach(el => {
        const key = el.dataset.i18nPh;
        const val = TRANSLATIONS[currentLang]?.[key];
        if (val) el.placeholder = val;
      });
    }

    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('shradhLang', lang);
      document.documentElement.lang = lang;
      document.getElementById('langSelect').value = lang;
      applyI18n();
      generateBanner();
    }

    document.getElementById('langSelect').addEventListener('change', function() {
      setLanguage(this.value);

        setTimeout(() => {
          document.getElementById('previewPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 350);
      }
    }

    /* ════════════════════════════════════════════════════════════
       BANNER SCALING (responsive preview)
    ════════════════════════════════════════════════════════════ */
    const BANNER_NATURAL_WIDTH = 1100;

    function updateBannerScale() {
      const wrapper = document.querySelector('.banner-preview-wrapper');
      const banner  = document.getElementById('banner');
      if (!wrapper || !banner) return;
      banner.style.transform = '';
      banner.style.width     = '';
      const available = wrapper.clientWidth;
      if (available < BANNER_NATURAL_WIDTH) {
        const scale = available / BANNER_NATURAL_WIDTH;
        banner.style.width = BANNER_NATURAL_WIDTH + 'px';
        const h = banner.offsetHeight;
        banner.style.transform = 'scale(' + scale + ')';
        wrapper.style.height   = (h * scale) + 'px';
      } else {
        wrapper.style.height = '';
      }
    }

    /* ════════════════════════════════════════════════════════════
       DOWNLOAD HELPERS
    ════════════════════════════════════════════════════════════ */
    function saveAndResetScale(bannerEl) {
      const wrapper = document.querySelector('.banner-preview-wrapper');
      const saved   = {
        transform: bannerEl.style.transform,
        width:     bannerEl.style.width,
        wrapperH:  wrapper?.style.height || ''
      };
      bannerEl.style.transform = 'none';
      bannerEl.style.width     = '';
      if (wrapper) wrapper.style.height = 'auto';
      return saved;
    }

    function restoreScale(bannerEl, saved) {
      const wrapper = document.querySelector('.banner-preview-wrapper');
      bannerEl.style.transform = saved.transform;
      bannerEl.style.width     = saved.width;
      if (wrapper) wrapper.style.height = saved.wrapperH;
    }

    function triggerDownload(canvas, filename) {
      const link    = document.createElement('a');
      link.download = filename;
      link.href     = canvas.toDataURL('image/jpeg', 0.92);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // Compose a source canvas into a target aspect ratio with letterboxing
    function composeToFormat(srcCanvas, targetW, targetH, bgColor) {
      const out = document.createElement('canvas');
      out.width  = targetW;
      out.height = targetH;
      const ctx  = out.getContext('2d');
      ctx.fillStyle = bgColor || '#ffffff';
      ctx.fillRect(0, 0, targetW, targetH);
      const srcR = srcCanvas.width / srcCanvas.height;
      const tgtR = targetW / targetH;
      let dw, dh, dx, dy;
      if (srcR > tgtR) {
        dw = targetW; dh = targetW / srcR; dx = 0; dy = (targetH - dh) / 2;
      } else {
        dh = targetH; dw = targetH * srcR; dx = (targetW - dw) / 2; dy = 0;
      }
      ctx.drawImage(srcCanvas, dx, dy, dw, dh);
      return out;
    }

    // Get the current theme's solid background color for letterboxing
    function getCurrentThemeBg() {
      const themeKey = document.getElementById('colorTheme').value;
      return colorThemes[themeKey]?.bgSolid || '#ffffff';
    }

    const FLEX_SIZES = {
      '2x3': { w: 2, h: 3 }, '3x4': { w: 3, h: 4 },
      '4x6': { w: 4, h: 6 }, '6x4': { w: 6, h: 4 }
    };

    const FLEX_SCALE = { '72': 1.5, '150': 3.0, '300': 5.0 };

    /* ════════════════════════════════════════════════════════════
       DOWNLOAD BANNER — dispatches by format
    ════════════════════════════════════════════════════════════ */
    function downloadBanner(event) {
      const fmt      = document.getElementById('bannerFormat').value;
      const bannerEl = document.getElementById('banner');
      const btn      = event.currentTarget;
      const origText = btn.innerHTML;

      btn.innerHTML = t('msg.downloading');
      btn.disabled  = true;

      const saved         = saveAndResetScale(bannerEl);
      const captureScale  = fmt === 'flex'
        ? (FLEX_SCALE[document.getElementById('flexDpi').value] || 3.0)
        : 2.5;

      html2canvas(bannerEl, { scale: captureScale, useCORS: true, logging: false })
        .then(srcCanvas => {
          let finalCanvas = srcCanvas;
          let filename    = 'memorial-banner.jpg';
          const bg        = getCurrentThemeBg();

          if (fmt === 'whatsapp') {
            finalCanvas = composeToFormat(srcCanvas, 1080, 1920, bg);
            filename    = 'whatsapp-status.jpg';
          } else if (fmt === 'ig-story') {
            finalCanvas = composeToFormat(srcCanvas, 1080, 1920, bg);
            filename    = 'instagram-story.jpg';
          } else if (fmt === 'ig-post') {
            finalCanvas = composeToFormat(srcCanvas, 1080, 1080, bg);
            filename    = 'instagram-post.jpg';
          } else if (fmt === 'flex') {
            const sizeKey = document.getElementById('flexSize').value;
            const { w, h } = FLEX_SIZES[sizeKey] || { w: 4, h: 6 };
            const outW = 1800, outH = Math.round(1800 * h / w);
            finalCanvas = composeToFormat(srcCanvas, outW, outH, bg);
            filename    = `flex-print-${w}x${h}ft.jpg`;
          }

          triggerDownload(finalCanvas, filename);
        })
        .catch(() => alert(t('msg.error')))
        .finally(() => {
          restoreScale(bannerEl, saved);
          btn.innerHTML = origText;
          btn.disabled  = false;
        });
    }

    /* ════════════════════════════════════════════════════════════
       FORMAT PICKER — show/hide flex sub-options
    ════════════════════════════════════════════════════════════ */
    document.getElementById('bannerFormat').addEventListener('change', function() {
      document.getElementById('flexOptions').hidden = this.value !== 'flex';
    });

    /* ════════════════════════════════════════════════════════════
       THEME SWATCHES
    ════════════════════════════════════════════════════════════ */
    document.querySelectorAll('.theme-swatch').forEach(swatch => {
      swatch.addEventListener('click', function() {
        document.querySelectorAll('.theme-swatch').forEach(s => {
          s.classList.remove('active');
          s.setAttribute('aria-pressed', 'false');
        });
        this.classList.add('active');
        this.setAttribute('aria-pressed', 'true');
        document.getElementById('colorTheme').value = this.dataset.themeValue;
        generateBanner();
      });
    });

    /* ════════════════════════════════════════════════════════════
       UI THEME TOGGLE
    ════════════════════════════════════════════════════════════ */
    document.getElementById('uiThemeToggle').addEventListener('click', function() {
      const html = document.documentElement;
      html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    /* ════════════════════════════════════════════════════════════
       MOBILE: SCROLL TO PREVIEW
    ════════════════════════════════════════════════════════════ */
    document.getElementById('scrollToPreview').addEventListener('click', function() {
      document.getElementById('previewPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    /* ════════════════════════════════════════════════════════════
       FULL-SCREEN PREVIEW DIALOG
    ════════════════════════════════════════════════════════════ */
    document.getElementById('openPreview').addEventListener('click', function() {
      const bannerEl   = document.getElementById('banner');
      const dialog     = document.getElementById('previewDialog');
      const imgEl      = document.getElementById('previewDialogImg');
      const loadingEl  = document.getElementById('dialogLoading');

      imgEl.style.display     = 'none';
      loadingEl.style.display = 'block';
      loadingEl.textContent   = t('msg.previewLoad');
      dialog.showModal();

      const saved = saveAndResetScale(bannerEl);

      html2canvas(bannerEl, { scale: 1.5, useCORS: true, logging: false })
        .then(canvas => {
          imgEl.src           = canvas.toDataURL('image/jpeg', 0.88);
          imgEl.style.display = 'block';
          loadingEl.style.display = 'none';
        })
        .catch(() => { loadingEl.textContent = t('msg.error'); })
        .finally(() => { restoreScale(bannerEl, saved); });
    });

    document.getElementById('closeDialog').addEventListener('click', function() {
      document.getElementById('previewDialog').close();
    });

    document.getElementById('previewDialog').addEventListener('click', function(e) {
      if (e.target === this) this.close();
    });

    /* ════════════════════════════════════════════════════════════
       INIT
    ════════════════════════════════════════════════════════════ */
    window.addEventListener('load', function() {
      // Restore saved language
      const savedLang = localStorage.getItem('shradhLang') || 'mr';
      currentLang = savedLang;
      document.getElementById('langSelect').value = savedLang;
      document.documentElement.lang = savedLang;
      applyI18n();
      generateBanner();
      updateBannerScale();
    });

    window.addEventListener('resize', updateBannerScale);
    </script>
</body>
</html>
